<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- <meta name=viewport content='width=device-width,initial-scale=1,user-scalable=0'> -->
  <title>🎲 Gammon (Backgammon)</title>
  <style>
    body {
      background: #222;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 10px;
    }
    canvas {
      background: #c9a26b;
      border: 4px solid #000;
      margin-bottom: 10px;
    }
    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <canvas id="board" width="1000" height="500"></canvas>
  <div id="controls">
    <select id="boardStyle">
      <option value="classic">Classic</option>
      <option value="coffee">Coffee</option>
      <option value="casino">Casino</option>
      <option value="monochrome">Monochrome</option>
    </select>
    <button id="restartBtn">Restart</button>
    <button id="rollBtn">Roll Dice</button>
    <span id="diceDisplay"></span>
    <span id="status"></span>
    <br>
    <span id="pipcount"></span>
  </div>

  <script src="backgammon.js"></script>
</body>
</html>
